name: glibc-fallback

# Verifies that Build.rakumod's glibc version check correctly
# identifies a system with glibc older than $MIN-GLIBC (2.35,
# ubuntu-22.04's baseline) and short-circuits to the
# system-libonnxruntime fallback path rather than downloading a
# prebuilt that might be fine but we'd rather not trust.
#
# Container: ubuntu:20.04 (glibc 2.31 — below MIN-GLIBC 2.35, so
# the guard fires). ubuntu:18.04 is too old for actions/checkout
# (Node 20 requires glibc 2.28+). Matches CRoaring's
# glibc-fallback.yml structure exactly.

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  old-glibc-fallback:
    name: Ubuntu 20.04 (glibc 2.31) → fallback path
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    # Containers default to /bin/sh (dash) — force bash for
    # pipefail and process substitution.
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install system deps
        run: |
          apt-get update
          # Focal's `rakudo` package is stale; setup-raku below
          # pulls a current Rakudo prebuilt (runs fine on glibc
          # 2.31).
          apt-get install -y --no-install-recommends \
              build-essential curl ca-certificates git
          ldd --version

      - uses: actions/checkout@v4

      - uses: Raku/setup-raku@v1
        with:
          raku-version: 'latest'

      # Case 1: BINARY_ONLY=1 on old glibc → must die cleanly with
      # the glibc-mismatch message. There's no fallback that can
      # save this combination; we just need the error to be
      # understandable rather than a mystery "GLIBC_2.xx not
      # found" at dlopen.
      - name: Install with BINARY_ONLY=1 (expect hard fail)
        id: binary-only
        env:
          ONNX_NATIVE_BINARY_ONLY: '1'
        run: |
          set +e
          zef install --/test --verbose . 2>&1 | tee build-binary-only.log
          rc=${PIPESTATUS[0]}
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # We EXPECT this to fail. Propagate success-on-failure.
          if [[ $rc -ne 0 ]]; then
            echo "✅ zef install failed as expected under BINARY_ONLY=1"
            exit 0
          fi
          echo "❌ Expected failure but install succeeded"
          exit 1

      - name: Assert BINARY_ONLY error names glibc
        run: |
          if ! grep -iF 'glibc' build-binary-only.log; then
            echo "::error::Expected build-binary-only.log to mention glibc mismatch"
            echo "---- tail ----"
            tail -60 build-binary-only.log
            exit 1
          fi
          echo "✅ Error message correctly identifies glibc as the cause"

      # Case 2: default settings on old glibc → Build.rakumod
      # should detect, note the glibc mismatch, and try the
      # system-libonnxruntime fallback. In a bare ubuntu:18.04
      # container there IS no system libonnxruntime, so this
      # still fails, but it should fail further down the chain
      # and the log should show the fallback message.
      - name: Install default (expect fallback attempt)
        id: default
        run: |
          set +e
          zef install --/test --verbose . 2>&1 | tee build-default.log
          rc=${PIPESTATUS[0]}
          echo "Exit code: $rc (expected non-zero since no system ORT is installed)"

      - name: Assert fallback message appeared
        run: |
          if ! grep -iE 'falling back to system libonnxruntime|glibc.*older than prebuilt' build-default.log; then
            echo "::error::Expected the glibc-fallback message in the build log"
            echo "---- tail ----"
            tail -80 build-default.log
            exit 1
          fi
          echo "✅ Build.rakumod correctly noted the glibc mismatch and attempted the system-ORT fallback"
